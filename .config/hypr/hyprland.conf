# Hyprland Configuration
# https://wiki.hypr.land/Configuring/

# ==================
# MONITOR CONFIG
# ==================
# monitor = eDP-2, 2560x1600@239.998993, 2560x0, 1, vrr, 1
monitor = , preferred,auto,auto

# ==================
# STARTUP APPS
# ==================
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target

exec-once = otd-daemon
exec-once = input-remapper-control --command autoload
exec-once = hintsd
exec = pidof clight || clight
exec-once = powertop

exec-once = xrdb -merge ~/.Xresources

# ==================
# ENVIROMENT VARS
# ==================
env = HYPRLAND_NO_RT=1

env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = XDG_SESSION_TYPE,wayland

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = AQ_FORCE_LINEAR_BLIT=0
env = AQ_NO_MODIFIERS=1
# env = LIBVA_DRIVER_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct
# env = AQ_NO_ATOMIC,1 # later try this

# env = GDK_DPI_SCALE,1
# env = GDK_SCALE,1.5
# env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# env = QT_QPA_PLATFORM,wayland
# env = QT_QPA_PLATFORM,wayland;xcb
# env = QT_SCALE_FACTOR,1.5

# ==================
# INPUT CONFIG
# ==================
input {
    kb_layout  = custom, ua
    kb_variant =       ,
    kb_model   =

    kb_options = grp:alt_shift_toggle #č kurwa zařizen

    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    #force_no_accel=true

    touchpad {
        natural_scroll = true
    }
}

# ==================
# GENERAL LAYOUT
# ==================
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    layout = dwindle
}

# ==================
# DECORATION
# ==================
decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow:enabled = false
    blur:enabled = false
}

# ==================
# ANIMATIONS
# ==================
animations {
    enabled = true

    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = workspaces, 1, 5, default
    animation = windowsMove, 1, 4, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

# ==================
# LAYOUTS
# ==================
dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

# ==================
# MISC
# ==================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

xwayland:force_zero_scaling = true
debug:disable_scale_checks = true
debug:disable_logs = false

# ==================
# WINDOW RULES
# ==================
windowrule = tile on, match:class ^(org\.wezfurlong\.wezterm)$

windowrule = rounding 12, match:class ^(org\.gnome\.)

windowrule = tile on, match:class ^(gnome-control-center)$
windowrule = tile on, match:class ^(pavucontrol)$
windowrule = tile on, match:class ^(nm-connection-editor)$

windowrule = float on, match:class ^(org\.gnome\.Calculator)$
windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = float on, match:class ^(xdg-desktop-portal)$

windowrule = no_initial_focus on, match:class ^(steam)$, match:title ^(notificationtoasts)
windowrule = pin on, match:class ^(steam)$, match:title ^(notificationtoasts)

windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zoom)$

# General suppression for maximize events
windowrule = match:class .*, suppress_event maximize

# Rules for floating windows
windowrule = match:title ^(.*_floating.*)$, float on, size (monitor_w*0.5) (monitor_h*0.5)

windowrule = match:title nwg-displays, float on, size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:class VirtualBox Machine, float on, size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:class ^(.*telegram.*)$, match:title ^(Telegram).*, float on, size (monitor_w*0.3) (monitor_h*0.3)
windowrule = match:class org.pulseaudio.pavucontrol, float on, size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:class org.pulseaudio.pavucontrol, float on, size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:title Fireplace, float on, center on

# Auto tile = buggy steam games
# windowrule = match:class ^(steam_app.*)$, tile on

# Auto float ueberzug
windowrule = match:title ^(ueberzugpp_.*)$, tile off

# GP7 - initial focused
windowrule = match:initial_title Guitar Pro 7, tile on
windowrule = match:title ^(Guitar Pro 7)$, no_initial_focus on

# ueberzug(pp) (with lf/ranger) do not focus the window
windowrule = match:title ^(ueberzug_.*)$, no_initial_focus on, opacity 1.0 1.0
windowrule = match:title ^(ueberzugpp_.*)$, no_initial_focus on, opacity 1.0 1.0


# DMS windows floating by default
# ! Hyprland doesn't size these windows correctly so disabling by default here
# windowrule = float on, match:class ^(org.quickshell)$

layerrule = no_anim on, match:namespace ^(quickshell)$
layerrule = no_anim on, match:namespace ^dms:.*

source = ./dms/colors.conf
source = ./dms/outputs.conf
source = ./dms/layout.conf
source = ./dms/cursor.conf
source = ./dms/binds.conf

general {
    gaps_in = 4
}

